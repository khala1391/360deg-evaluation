<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360° Evaluation Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Sarabun', sans-serif; background: #f0f2f5; color: #333; margin: 0; }

    /* ---- Report wrapper ---- */
    .report-wrap { max-width: 210mm; margin: 0 auto; padding: 16px; }
    .report-page {
      background: #fff; padding: 28px 32px; border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
    }

    /* ---- Header ---- */
    .rpt-header { text-align: center; border-bottom: 3px solid #1a237e; padding-bottom: 18px; margin-bottom: 22px; }
    .rpt-header h1 { color: #1a237e; font-size: 1.6rem; font-weight: 700; margin: 0; }
    .rpt-header h2 { color: #555; font-size: 1.05rem; font-weight: 400; margin: 4px 0 0; }
    .rpt-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 14px; }
    .rpt-meta .badge { font-size: 0.88rem; padding: 6px 14px; font-weight: 500; }

    /* ---- Score circle ---- */
    .overall-box { text-align: center; margin-bottom: 24px; }
    .score-circle {
      width: 96px; height: 96px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.9rem; font-weight: 700; color: #fff;
    }
    .sc-1 { background: #c62828; } .sc-2 { background: #e65100; }
    .sc-3 { background: #f9a825; color: #333; } .sc-4 { background: #2e7d32; }
    .sc-5 { background: #1a237e; }

    /* ---- Score bars ---- */
    .bar-row { display: flex; align-items: center; margin-bottom: 10px; gap: 8px; }
    .bar-label { flex: 0 0 46%; font-weight: 600; font-size: 0.9rem; }
    .bar-track { flex: 1; height: 14px; background: #e9ecef; border-radius: 7px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 7px; }
    .bar-val { flex: 0 0 48px; text-align: right; font-weight: 700; font-size: 1rem; }

    /* ---- Section headings ---- */
    .sec-title { font-weight: 700; font-size: 1.1rem; color: #1a237e; margin: 22px 0 12px; border-left: 4px solid #1a237e; padding-left: 10px; }

    /* ---- Tables ---- */
    .rpt-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-bottom: 16px; }
    .rpt-table th { background: #1a237e; color: #fff; font-weight: 600; padding: 7px 8px; text-align: center; white-space: nowrap; }
    .rpt-table th:first-child { text-align: left; }
    .rpt-table td { padding: 6px 8px; border-bottom: 1px solid #e0e0e0; vertical-align: middle; }
    .rpt-table tbody tr:hover { background: #f9f9f9; }
    .rpt-table .c { text-align: center; }

    /* ---- Topic block ---- */
    .topic-block { border: 1px solid #ddd; border-radius: 8px; padding: 14px 16px; margin-bottom: 14px; page-break-inside: avoid; }
    .topic-block-title { font-weight: 700; color: #1a237e; font-size: 1rem; border-bottom: 2px solid #e8eaf6; padding-bottom: 6px; margin-bottom: 10px; }

    /* ---- Feedback cards ---- */
    .fb-card { background: #f8f9fa; border-left: 4px solid #1a237e; padding: 10px 14px; margin-bottom: 6px; border-radius: 0 6px 6px 0; font-size: 0.9rem; line-height: 1.5; }
    .fb-q { font-weight: 600; color: #1a237e; font-size: 0.85rem; margin-bottom: 6px; }
    .fb-none { color: #999; font-size: 0.85rem; margin-left: 8px; }

    /* ---- Score chips ---- */
    .sc-chip { display: inline-block; padding: 1px 9px; border-radius: 10px; font-size: 0.78rem; font-weight: 600; margin: 1px 2px; }

    /* ---- Footer ---- */
    .rpt-footer { text-align: center; border-top: 2px solid #e0e0e0; padding-top: 16px; margin-top: 28px; color: #999; font-size: 0.8rem; }

    /* ---- Buttons (screen only) ---- */
    .action-bar {
      position: fixed; top: 16px; right: 16px; z-index: 100;
      display: flex; gap: 6px;
    }
    .action-bar .btn { font-size: 0.85rem; padding: 6px 14px; border-radius: 8px; }

    /* ---- Loading ---- */
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .spinner { width: 44px; height: 44px; border: 4px solid #e0e0e0; border-top-color: #1a237e; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- PDF-specific (html2canvas compatibility) ---- */
    .pdf-mode { overflow: visible !important; }
    .pdf-mode .action-bar { display: none !important; }
    .pdf-mode .report-wrap {
      padding: 0 !important; max-width: none !important;
      width: 794px !important; margin: 0 !important;
    }
    .pdf-mode .report-page {
      box-shadow: none !important; border-radius: 0 !important;
      padding: 20px 24px !important; width: 100% !important;
    }
    /* Force color rendering */
    .pdf-mode * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    /* Convert flexbox → float for html2canvas */
    .pdf-mode .bar-row {
      display: block !important; overflow: hidden !important; margin-bottom: 10px !important;
    }
    .pdf-mode .bar-label {
      float: left !important; width: 46% !important; display: block !important;
    }
    .pdf-mode .bar-track {
      float: left !important; width: 40% !important; display: block !important;
      margin: 4px 4px 0 4px !important;
    }
    .pdf-mode .bar-val {
      float: right !important; width: 10% !important; display: block !important;
      text-align: right !important;
    }
    .pdf-mode .rpt-meta {
      display: block !important; text-align: center !important;
    }
    .pdf-mode .rpt-meta .badge {
      display: inline-block !important; margin: 3px !important;
    }
    .pdf-mode .score-circle {
      display: block !important; margin: 0 auto !important;
      text-align: center !important; line-height: 96px !important;
    }
    .pdf-mode .rpt-table {
      table-layout: fixed !important; width: 100% !important;
    }
    /* Page break hints */
    .pdf-mode .sec-title { page-break-after: avoid !important; }
    .pdf-mode .topic-block {
      page-break-inside: avoid !important; break-inside: avoid !important;
    }
    .pdf-mode .overall-box { page-break-inside: avoid !important; }

    /* ---- Print ---- */
    @media print {
      body { background: #fff; }
      .action-bar { display: none !important; }
      .report-wrap { padding: 0; max-width: 100%; }
      .report-page { box-shadow: none; border-radius: 0; padding: 0; }
      .topic-block { page-break-inside: avoid; }
      .score-circle, .bar-fill, .sc-chip, .rpt-table th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <!-- Loading -->
  <div id="loadingOverlay" class="loading-overlay">
    <div class="text-center">
      <div class="spinner mb-3" style="margin:0 auto"></div>
      <p style="color:#888">กำลังโหลดรายงาน...</p>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="btn btn-primary" onclick="window.print()"><i class="bi bi-printer me-1"></i>พิมพ์</button>
    <button class="btn btn-success" onclick="downloadPDF()"><i class="bi bi-file-pdf me-1"></i>PDF</button>
    <a href="/admin" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Admin</a>
  </div>

  <!-- Report -->
  <div class="report-wrap">
    <div id="reportContent" class="report-page">
      <div id="reportBody"><p class="text-center text-muted py-5">กำลังโหลด...</p></div>
    </div>
  </div>

  <script>
    let reportData = null;

    // ======== helpers ========
    function scoreColor(s) {
      if (s >= 4.5) return '#1a237e';
      if (s >= 3.5) return '#2e7d32';
      if (s >= 2.5) return '#f9a825';
      if (s >= 1.5) return '#e65100';
      return '#c62828';
    }
    function scoreClass(s) {
      if (s >= 4.5) return 'sc-5';
      if (s >= 3.5) return 'sc-4';
      if (s >= 2.5) return 'sc-3';
      if (s >= 1.5) return 'sc-2';
      return 'sc-1';
    }
    function scoreLabel(s) {
      if (s >= 4.5) return 'โดดเด่นมาก';
      if (s >= 3.5) return 'เกินความคาดหวัง';
      if (s >= 2.5) return 'ตามความคาดหวัง';
      if (s >= 1.5) return 'ต่ำกว่าความคาดหวัง';
      return 'ต้องปรับปรุง';
    }
    function chipHtml(score) {
      const c = scoreColor(score);
      return `<span class="sc-chip" style="background:${c}18;color:${c};border:1px solid ${c}40">${score}</span>`;
    }
    function f2(n) { return (n || 0).toFixed(2); }

    // ======== load ========
    async function loadReport() {
      const parts = location.pathname.split('/');
      const userId = parts[parts.length - 1];
      if (!userId || isNaN(userId)) {
        document.getElementById('reportBody').innerHTML = '<p class="text-center text-muted py-5">ไม่พบข้อมูลรายงาน</p>';
        document.getElementById('loadingOverlay').style.display = 'none';
        return;
      }
      try {
        const res = await fetch(`/api/admin/report/${userId}`);
        if (!res.ok) throw new Error('Unauthorized');
        reportData = await res.json();
        renderReport();
      } catch {
        document.getElementById('reportBody').innerHTML =
          '<p class="text-center text-danger py-5">ไม่สามารถโหลดรายงานได้ กรุณาเข้าสู่ระบบ Admin ก่อน</p>';
      }
      document.getElementById('loadingOverlay').style.display = 'none';
    }

    // ======== render ========
    function renderReport() {
      const { user, cycle, ratings, openEnded, averages, topicAverages, topics, aspects, ratingScale } = reportData;

      const overallAvg = topicAverages.length > 0
        ? topicAverages.reduce((s, t) => s + t.avg_score, 0) / topicAverages.length : 0;
      const numEvaluators = topicAverages.length > 0 ? topicAverages[0].num_evaluators : 0;

      // ---- header ----
      let html = `
        <div class="rpt-header">
          <h1>360° Executive Evaluation Report</h1>
          <h2>รายงานผลการประเมินผู้บริหาร 360 องศา</h2>
          <div class="rpt-meta">
            <span class="badge bg-primary">${user.display_name || user.email}</span>
            <span class="badge bg-secondary">${cycle.cycle_name}</span>
            <span class="badge bg-light text-dark border">${cycle.start_date} — ${cycle.end_date}</span>
          </div>
        </div>
      `;

      // ---- overall summary ----
      html += `
        <div class="overall-box">
          <h5 style="font-weight:700;margin-bottom:12px">สรุปคะแนนภาพรวม</h5>
          <div class="score-circle ${scoreClass(overallAvg)}">${f2(overallAvg)}</div>
          <div style="margin-top:8px;font-weight:600;color:${scoreColor(overallAvg)}">${scoreLabel(overallAvg)}</div>
          <div style="color:#888;font-size:0.88rem;margin-top:2px">จากผู้ประเมิน ${numEvaluators} คน</div>
        </div>
      `;

      // ---- topic score bars ----
      html += `<div class="sec-title">คะแนนรายด้าน (Topic Scores)</div>`;
      topics.forEach(topic => {
        const td = topicAverages.find(t => t.topic_number === topic.number);
        const sc = td ? td.avg_score : 0;
        const pct = (sc / 5) * 100;
        html += `
          <div class="bar-row">
            <div class="bar-label">${topic.number}. ${topic.title}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${scoreColor(sc)}"></div></div>
            <div class="bar-val" style="color:${scoreColor(sc)}">${f2(sc)}</div>
          </div>
        `;
      });

      // ---- topic summary table ----
      html += `
        <div class="topic-block" style="margin-top:16px">
          <table class="rpt-table">
            <thead><tr>
              <th style="text-align:left">ด้าน</th>
              <th style="width:18%">คะแนนเฉลี่ย</th>
              <th style="width:18%">ระดับ</th>
              <th style="width:14%">ผู้ประเมิน</th>
            </tr></thead><tbody>
      `;
      topics.forEach(topic => {
        const td = topicAverages.find(t => t.topic_number === topic.number);
        const sc = td ? td.avg_score : 0;
        html += `<tr>
          <td><strong>${topic.number}.</strong> ${topic.title} <span style="color:#888;font-size:0.82rem">(${topic.titleEn})</span></td>
          <td class="c" style="font-weight:700;color:${scoreColor(sc)}">${f2(sc)}</td>
          <td class="c" style="color:${scoreColor(sc)};font-size:0.85rem">${scoreLabel(sc)}</td>
          <td class="c">${td ? td.num_evaluators : 0}</td>
        </tr>`;
      });
      html += `<tr style="font-weight:700;background:#f5f5f5">
        <td>คะแนนรวมเฉลี่ย</td>
        <td class="c" style="color:${scoreColor(overallAvg)};font-size:1.05rem">${f2(overallAvg)}</td>
        <td class="c" style="color:${scoreColor(overallAvg)}">${scoreLabel(overallAvg)}</td>
        <td class="c">${numEvaluators}</td>
      </tr>`;
      html += `</tbody></table></div>`;

      // ---- detailed subtopic ----
      html += `<div class="sec-title" style="margin-top:28px">คะแนนรายหัวข้อย่อย (Detailed Subtopic Scores)</div>`;
      topics.forEach(topic => {
        html += `<div class="topic-block">
          <div class="topic-block-title">ด้านที่ ${topic.number}: ${topic.title} (${topic.titleEn})</div>
          <table class="rpt-table">
            <thead><tr>
              <th style="text-align:left;width:36%">หัวข้อ</th>
              <th style="width:12%">เฉลี่ย</th>
              <th style="width:10%">ต่ำสุด</th>
              <th style="width:10%">สูงสุด</th>
              <th style="width:10%">ผู้ประเมิน</th>
              <th style="width:22%">คะแนนแต่ละคน</th>
            </tr></thead><tbody>`;

        topic.subTopics.forEach(sub => {
          const sd = averages.find(a => a.topic_number === topic.number && a.sub_topic_number === sub.number);
          const raw = ratings.filter(r => r.topic_number === topic.number && r.sub_topic_number === sub.number);
          const avgVal = sd ? sd.avg_score : 0;
          html += `<tr>
            <td><strong>${topic.number}.${sub.number}</strong> ${sub.title}</td>
            <td class="c" style="font-weight:700;color:${scoreColor(avgVal)}">${sd ? f2(avgVal) : '-'}</td>
            <td class="c">${sd ? sd.min_score : '-'}</td>
            <td class="c">${sd ? sd.max_score : '-'}</td>
            <td class="c">${sd ? sd.num_evaluators : 0}</td>
            <td class="c">${raw.map(r => chipHtml(r.score)).join('') || '-'}</td>
          </tr>`;
        });

        // topic subtotal row
        const topicData = topicAverages.find(t => t.topic_number === topic.number);
        const topicAvg = topicData ? topicData.avg_score : 0;
        html += `<tr style="font-weight:600;background:#f8f9fa;border-top:2px solid #1a237e">
          <td>เฉลี่ยด้านที่ ${topic.number}</td>
          <td class="c" style="color:${scoreColor(topicAvg)};font-size:0.95rem">${f2(topicAvg)}</td>
          <td colspan="4" class="c" style="color:${scoreColor(topicAvg)}">${scoreLabel(topicAvg)}</td>
        </tr>`;

        html += `</tbody></table></div>`;
      });

      // ---- rating scale legend ----
      html += `
        <div class="topic-block" style="background:#fafafa">
          <div class="topic-block-title">เกณฑ์การให้คะแนน (Rating Scale)</div>
          <table class="rpt-table">
            <thead><tr><th style="width:12%">คะแนน</th><th style="text-align:left;width:28%">ความหมาย</th><th style="text-align:left">รายละเอียด</th></tr></thead>
            <tbody>
      `;
      if (ratingScale && ratingScale.length > 0) {
        ratingScale.forEach(rs => {
          html += `<tr>
            <td class="c" style="font-weight:700;color:${scoreColor(rs.value)}">${rs.value}</td>
            <td>${rs.label || ''}</td>
            <td style="font-size:0.82rem;color:#666">${rs.description || ''}</td>
          </tr>`;
        });
      }
      html += `</tbody></table></div>`;

      // ---- open-ended feedback ----
      html += `<div class="sec-title" style="margin-top:28px">ข้อเสนอแนะแบบเปิด (Open-ended Feedback)</div>`;
      aspects.forEach(aspect => {
        html += `<div class="topic-block">
          <div class="topic-block-title">${aspect.title} (${aspect.titleEn})</div>`;
        
        aspect.questions.forEach(q => {
          const answers = openEnded.filter(oe => oe.aspect_number === aspect.number && oe.question_number === q.number && oe.answer && oe.answer.trim());
          html += `<div style="margin-bottom:12px">
            <div class="fb-q">${aspect.number}.${q.number} ${q.label}: ${q.text}</div>`;
          if (answers.length > 0) {
            answers.forEach((a, idx) => {
              html += `<div class="fb-card"><span style="color:#888;font-size:0.8rem">ผู้ประเมินคนที่ ${idx + 1}:</span> "${a.answer}"</div>`;
            });
          } else {
            html += `<div class="fb-none">— ไม่มีข้อเสนอแนะ —</div>`;
          }
          html += `</div>`;
        });
        html += `</div>`;
      });

      // ---- evaluator summary ----
      const evaluatorEmails = [...new Set(ratings.map(r => r.evaluator_name || r.evaluator_email))];
      html += `
        <div class="topic-block" style="background:#fafafa">
          <div class="topic-block-title">ข้อมูลผู้ประเมิน (Evaluator Summary)</div>
          <p style="font-size:0.88rem;color:#555">จำนวนผู้ประเมินทั้งหมด: <strong>${evaluatorEmails.length}</strong> คน</p>
          <p style="font-size:0.8rem;color:#999">หมายเหตุ: คะแนนแต่ละคนจะแสดงโดยไม่ระบุชื่อผู้ประเมิน เพื่อรักษาความเป็นกลางของผลประเมิน</p>
        </div>
      `;

      // ---- footer ----
      const now = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
      html += `
        <div class="rpt-footer">
          เอกสารนี้เป็นความลับ สร้างโดยระบบ 360° Executive Evaluation System<br>
          สร้างเมื่อ: ${now}
        </div>
      `;

      document.getElementById('reportBody').innerHTML = html;
    }

    // ======== PDF download ========
    async function downloadPDF() {
      const el = document.getElementById('reportContent');
      const userName = reportData?.user?.display_name || reportData?.user?.email || 'report';
      const cycleName = reportData?.cycle?.cycle_name || '';
      const filename = `360_Evaluation_${userName}_${cycleName}.pdf`.replace(/[\/\\?%*:|"<>]/g, '-');

      // Switch to PDF mode and scroll to top
      document.body.classList.add('pdf-mode');
      window.scrollTo(0, 0);
      // Wait for reflow & font rendering
      await new Promise(r => setTimeout(r, 500));

      const opt = {
        margin: [10, 8, 10, 8],
        filename,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: {
          scale: 2,
          useCORS: true,
          letterRendering: true,
          logging: false,
          width: 794,
          windowWidth: 794,
          scrollX: 0,
          scrollY: 0
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
        pagebreak: {
          mode: ['css', 'legacy'],
          avoid: ['.topic-block', '.overall-box', '.rpt-header']
        }
      };

      try {
        await html2pdf().set(opt).from(el).save();
      } catch (err) {
        console.error('PDF generation failed:', err);
        alert('ไม่สามารถสร้าง PDF ได้ กรุณาใช้ปุ่ม "พิมพ์" แทน');
      } finally {
        document.body.classList.remove('pdf-mode');
      }
    }

    loadReport();
  </script>
</body>
</html>
